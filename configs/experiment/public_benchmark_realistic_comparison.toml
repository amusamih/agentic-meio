[experiment]
name = "public_benchmark_realistic_comparison"
benchmark_candidate = "replenishment_env"
discovery_module = "ReplenishmentEnv"
benchmark_root = "third_party/ReplenishmentEnv"
demo_config_path = "config/demo.yml"
agent_config = "configs/agent/live_llm.toml"
environment_config_name = "sku50.single_store.standard"
wrapper_names = ["HistoryWrapper"]
benchmark_mode = "test"
smoke_horizon_steps = 1
mode_set = [
    "deterministic_baseline",
    "robust_policy",
    "scenario_rolling_horizon_policy",
    "llm_regret_guarded_risk_sensitive_scenario_planner_orchestrator",
]
episode_horizon_steps = 10
base_stock_multiplier = 1.0
demand_scale_epsilon = 1e-6
results_dir = "results/public_benchmark_realistic_comparison"

[uncertainty_baselines.robust_policy]
window_length = 14
quantile = 0.80
safety_buffer_scale = 1.05

[uncertainty_baselines.scenario_rolling_horizon_policy]
horizon_length = 3
scenario_count = 8
random_seed = 20260417
demand_multipliers = [0.95, 1.0, 1.10, 1.25]
leadtime_multipliers = [1.0, 1.15]
safety_buffer_scales = [1.0, 1.05, 1.10]
