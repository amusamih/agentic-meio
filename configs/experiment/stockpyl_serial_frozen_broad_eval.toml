[experiment]
name = "stockpyl_serial_frozen_broad_eval"
benchmark_config = "configs/benchmark/serial_3_echelon.toml"
agent_config = "configs/agent/live_llm.toml"
episode_count = 3
seed_set = [20260417, 20260418, 20260419]
mode_set = [
    "deterministic_baseline",
    "deterministic_orchestrator",
    "llm_orchestrator",
]
tool_ablation_variants = ["full"]
results_dir = "results/stockpyl_serial_frozen_broad_eval"

[[regime_schedules]]
