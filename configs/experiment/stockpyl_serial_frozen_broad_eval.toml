[[regime_schedules]]
name = "long_shift_recovery"
labels = ["normal", "demand_regime_shift", "demand_regime_shift", "recovery"]

[[regime_schedules]]
name = "delayed_shift_recovery"
labels = ["normal", "normal", "demand_regime_shift", "recovery"]

[[regime_schedules]]
name = "delayed_sustained_shift"
labels = ["normal", "normal", "demand_regime_shift", "demand_regime_shift"]

[[regime_schedules]]
name = "false_alarm_then_real_shift"
labels = ["normal", "recovery", "demand_regime_shift", "demand_regime_shift"]

[[regime_schedules]]
name = "double_shift_with_gap"
labels = ["normal", "demand_regime_shift", "normal", "demand_regime_shift"]

[[regime_schedules]]
name = "recovery_then_relapse"
