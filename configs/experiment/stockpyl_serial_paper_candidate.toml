[experiment]
name = "stockpyl_serial_paper_candidate"
benchmark_config = "configs/benchmark/serial_3_echelon.toml"
agent_config = "configs/agent/live_llm.toml"
episode_count = 2
seed_set = [20260417, 20260418]
mode_set = [
    "deterministic_baseline",
    "deterministic_orchestrator",
    "llm_orchestrator",
]
tool_ablation_variants = ["full"]
results_dir = "results/stockpyl_serial_paper_candidate"

[[regime_schedules]]
name = "shift_recovery"
labels = ["normal", "demand_regime_shift", "recovery"]

[[regime_schedules]]
name = "sustained_shift"
labels = ["normal", "demand_regime_shift", "demand_regime_shift"]

[[regime_schedules]]
name = "recovery_false_alarm"
labels = ["normal", "recovery", "normal"]

[[regime_schedules]]
name = "long_shift_recovery"
labels = ["normal", "demand_regime_shift", "demand_regime_shift", "recovery"]
