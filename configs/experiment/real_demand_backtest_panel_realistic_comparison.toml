[experiment]
name = "real_demand_backtest_panel_realistic_comparison"
benchmark_config = "configs/benchmark/serial_3_echelon.toml"
agent_config = "configs/agent/live_llm.toml"
discovery_module = "ReplenishmentEnv"
mode_set = [
  "deterministic_baseline",
  "robust_policy",
  "scenario_rolling_horizon_policy",
  "llm_regret_guarded_risk_sensitive_scenario_planner_orchestrator",
]
results_dir = "results/real_demand_backtest_panel_realistic_comparison"

[uncertainty_baselines.robust_policy]
window_length = 14
quantile = 0.80
safety_buffer_scale = 1.05

[uncertainty_baselines.scenario_rolling_horizon_policy]
horizon_length = 3
scenario_count = 8
random_seed = 20260417
demand_multipliers = [0.95, 1.0, 1.10, 1.25]
leadtime_multipliers = [1.0, 1.15]
safety_buffer_scales = [1.0, 1.05, 1.10]

[[slices]]
name = "store1_low_2018q4"
dataset_name = "replenishmentenv_sku2778_store1"
demand_csv_path = "data/sku2778/sku2778.demand.csv"
leadtime_csv_path = "data/sku2778/sku2778.store1.dynamic_vlt.csv"
sku_list_path = "data/sku2778/sku100.sku_list.csv"
selected_skus = ["SKU48", "SKU44", "SKU15", "SKU59", "SKU42"]
subset_selection = "explicit_selected_skus"
training_window_days = 180
history_window_days = 28
forecast_update_window_days = 1
evaluation_horizon_days = 30
evaluation_start_date = "2018/12/28"

