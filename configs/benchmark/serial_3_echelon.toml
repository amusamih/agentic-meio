[benchmark]
family = "serial"
service_model = "backorders"
scenario_families = ["normal", "demand_regime_shift", "supply_disruption", "joint_disruption", "recovery"]
random_seed = 20260417
demand_mean = 10.0

[system]
topology = "serial"
echelon_count = 3

[costs]
holding_cost = 1.0
backorder_cost = 5.0
ordering_cost = 0.5

[[stages]]
stage_index = 1
stage_name = "retailer"
initial_inventory = 20
shipment_lead_time = 2
base_stock_level = 20

[[stages]]
stage_index = 2
stage_name = "regional_dc"
initial_inventory = 30
shipment_lead_time = 2
base_stock_level = 30

[[stages]]
stage_index = 3
stage_name = "plant"
initial_inventory = 40
shipment_lead_time = 2
base_stock_level = 40
